
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Staff Management</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0b0b0b; color: white; font-family: 'Inter', sans-serif; padding: 30px; }
.header { display: flex; justify-content: space-between; align-items: center; }
.title { font-size: 26px; font-weight: 600; }
.subtitle { color: #9ca3af; margin-top: 5px; }
.add-btn { background: #3b82f6; border: none; padding: 10px 18px; border-radius: 10px; color: white; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 14px; }
.add-btn:hover { background: #2563eb; }
.card { margin-top: 25px; background: #151515; border: 1px solid #2a2a2a; border-radius: 14px; overflow: hidden; }
.card-header { display: flex; justify-content: space-between; align-items: center; padding: 18px 20px; border-bottom: 1px solid #2a2a2a; }
.search-box { display: flex; gap: 10px; }
.search { background: #111; border: 1px solid #2a2a2a; padding: 8px 12px; border-radius: 8px; color: white; font-family: 'Inter', sans-serif; width: 200px; outline: none; }
.search:focus { border-color: #3b82f6; }
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; min-width: 600px; }
th { padding: 12px 20px; font-size: 11px; color: #9ca3af; background: #111; text-align: left; white-space: nowrap; }
td { padding: 14px 20px; border-top: 1px solid #2a2a2a; font-size: 13px; vertical-align: middle; }
tr:hover { background: #1a1a1a; }
.name { font-weight: 600; }
.salary { font-weight: 600; }
.badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.paid   { background: rgba(34,197,94,0.15);  color: #22c55e; }
.unpaid { background: rgba(245,158,11,0.15); color: #f59e0b; }
.btn { border: none; padding: 5px 11px; border-radius: 7px; font-size: 12px; cursor: pointer; font-family: 'Inter', sans-serif; font-weight: 500; transition: opacity 0.15s; }
.btn:hover { opacity: 0.8; }
.btn + .btn { margin-left: 5px; }
.btn-edit   { background: #1f2937; color: white; }
.btn-pay    { background: #10b981; color: white; }
.btn-unpay  { background: #f59e0b; color: #000; }
.btn-delete { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
.btn-delete:hover { background: rgba(239,68,68,0.3); opacity: 1; }
.loading { text-align: center; padding: 40px; color: #9ca3af; }

/* MODAL */
.modal { display: none; position: fixed; z-index: 1000; inset: 0; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; }
.modal.show { display: flex; }
.modal-content { background: #151515; border: 1px solid #2a2a2a; border-radius: 14px; padding: 28px; width: 90%; max-width: 460px; }
.modal-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; }
.modal-header { font-size: 18px; font-weight: 600; }
.modal-close { background: none; border: 1px solid #2a2a2a; color: #9ca3af; cursor: pointer; width: 30px; height: 30px; border-radius: 7px; font-size: 16px; display: flex; align-items: center; justify-content: center; }
.modal-close:hover { color: #ef4444; border-color: #ef4444; }
.modal-form { display: flex; flex-direction: column; gap: 14px; }
.form-group { display: flex; flex-direction: column; }
.form-group label { font-size: 12px; color: #9ca3af; margin-bottom: 5px; }
.form-group input { background: #111; border: 1px solid #2a2a2a; padding: 10px 12px; border-radius: 8px; color: white; font-family: 'Inter', sans-serif; font-size: 14px; outline: none; }
.form-group input:focus { border-color: #3b82f6; }
.modal-buttons { display: flex; gap: 10px; margin-top: 6px; }
.modal-buttons button { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; font-family: 'Inter', sans-serif; font-size: 14px; }
.btn-save   { background: #3b82f6; color: white; }
.btn-save:hover { background: #2563eb; }
.btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-cancel { background: #1f2937; color: white; }
.btn-cancel:hover { background: #374151; }

/* DELETE CONFIRM MODAL */
.del-modal { display: none; position: fixed; z-index: 1100; inset: 0; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; }
.del-modal.show { display: flex; }
.del-box { background: #151515; border: 1px solid #2a2a2a; border-radius: 14px; padding: 28px; width: 90%; max-width: 380px; text-align: center; }
.del-box h3 { font-size: 17px; margin-bottom: 8px; }
.del-box p { color: #9ca3af; font-size: 13px; margin-bottom: 22px; }
.del-actions { display: flex; gap: 10px; }
.del-actions button { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; font-family: 'Inter', sans-serif; font-size: 14px; }
.del-confirm { background: #ef4444; color: white; }
.del-confirm:hover { background: #dc2626; }
.del-confirm:disabled { opacity: 0.5; cursor: not-allowed; }
.del-cancel { background: #1f2937; color: white; }

/* TOAST */
.toast { position: fixed; bottom: 20px; right: 20px; padding: 12px 18px; border-radius: 10px; font-size: 14px; font-weight: 500; z-index: 9999; display: none; }
.toast.show { display: block; }
.toast.success { background: rgba(34,197,94,0.15); border: 1px solid #22c55e; color: #22c55e; }
.toast.error   { background: rgba(239,68,68,0.1);  border: 1px solid #ef4444; color: #ef4444; }
</style>
</head>
<body>

<div style="margin-bottom:14px;">
    <button onclick="window.location.href='gym_owner_panel.html'" style="display:inline-flex;align-items:center;gap:6px;padding:7px 14px;background:#1e1e1e;color:#a0a0a0;border:1px solid #2a2a2a;border-radius:8px;font-size:0.8rem;font-weight:600;cursor:pointer;" onmouseover="this.style.borderColor='#666'" onmouseout="this.style.borderColor='#2a2a2a'">
        <svg viewBox="0 0 24 24" style="width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Back to Dashboard
    </button>
</div>

<div class="header">
    <div>
        <div class="title">Staff Management</div>
        <div class="subtitle">Manage staff and salary records</div>
    </div>
    <button class="add-btn" id="addBtn">+ Add Staff</button>
</div>

<div class="card">
    <div class="card-header">
        <div style="font-weight:500;">Staff List</div>
        <div class="search-box">
            <input class="search" id="searchInput" placeholder="Search staff...">
        </div>
    </div>
    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>NAME</th>
                    <th>PHONE</th>
                    <th>JOB ROLE</th>
                    <th>MONTHLY SALARY</th>
                    <th>PAYMENT STATUS</th>
                    <th>ACTIONS</th>
                </tr>
            </thead>
            <tbody id="staffTableBody">
                <tr><td colspan="6" class="loading">Loading staff data...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- ADD / EDIT MODAL -->
<div class="modal" id="staffModal">
    <div class="modal-content">
        <div class="modal-top">
            <div class="modal-header" id="modalTitle">Add Staff</div>
            <button class="modal-close" id="modalCloseBtn">✕</button>
        </div>
        <form class="modal-form" id="staffForm">
            <div class="form-group">
                <label>Name</label>
                <input type="text" id="nameInput" placeholder="Full name" required>
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="text" id="phoneInput" placeholder="Phone number" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="emailInput" placeholder="Email address">
            </div>
            <div class="form-group">
                <label>Job Role</label>
                <input type="text" id="roleInput" placeholder="e.g. Trainer, Manager, Receptionist" required>
            </div>
            <div class="form-group">
                <label>Monthly Salary (₹)</label>
                <input type="number" id="salaryInput" min="0" placeholder="e.g. 15000" required>
            </div>
            <div class="modal-buttons">
                <button type="submit" class="btn-save" id="saveBtn">Save</button>
                <button type="button" class="btn-cancel" id="cancelBtn">Cancel</button>
            </div>
        </form>
    </div>
</div>

<!-- DELETE CONFIRM MODAL -->
<div class="del-modal" id="deleteModal">
    <div class="del-box">
        <h3>Delete Staff Member?</h3>
        <p id="delName">This action cannot be undone.</p>
        <div class="del-actions">
            <button class="del-confirm" id="delConfirmBtn">Delete</button>
            <button class="del-cancel" id="delCancelBtn">Cancel</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script type="module" src="staff.js"></script>
</body>
</html>
