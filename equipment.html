
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Equipment Inventory</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #0b0b0b;
    color: white;
    font-family: 'Inter', sans-serif;
    padding: 30px;
}

/* BACK BUTTON */
.back-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    color: #e5e7eb;
    font-size: 14px;
    font-weight: 500;
    padding: 9px 16px;
    border-radius: 10px;
    cursor: pointer;
    margin-bottom: 24px;
    font-family: 'Inter', sans-serif;
    text-decoration: none;
    transition: background 0.15s;
}

.back-btn:hover {
    background: #222;
}

.back-btn svg {
    width: 16px;
    height: 16px;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.title {
    font-size: 24px;
    font-weight: 600;
}

.subtitle {
    font-size: 14px;
    color: #9ca3af;
    margin-top: 5px;
}

/* ADD BUTTON */
.add-btn {
    background: #3b82f6;
    border: none;
    padding: 10px 18px;
    border-radius: 10px;
    color: white;
    font-size: 14px;
    cursor: pointer;
}

.add-btn:hover {
    background: #2563eb;
}

/* CARD */
.card {
    margin-top: 25px;
    background: #151515;
    border: 1px solid #2a2a2a;
    border-radius: 14px;
    overflow: hidden;
}

/* CARD HEADER */
.card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 20px;
    border-bottom: 1px solid #2a2a2a;
}

.card-title {
    font-size: 16px;
    font-weight: 500;
}

/* SEARCH */
.search {
    background: #111;
    border: 1px solid #2a2a2a;
    padding: 8px 14px;
    border-radius: 8px;
    color: white;
    width: 220px;
}

.search::placeholder {
    color: #6b7280;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
}

th {
    text-align: left;
    padding: 14px 20px;
    font-size: 12px;
    color: #9ca3af;
    background: #111;
    letter-spacing: 0.05em;
}

td {
    padding: 18px 20px;
    border-top: 1px solid #2a2a2a;
}

/* ALIGNMENTS */
td:nth-child(4) {
    text-align: center;
}

/* BADGE */
.badge {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    display: inline-block;
}

.badge.good {
    background: rgba(34,197,94,0.15);
    color: #22c55e;
}

.badge.average {
    background: rgba(234,179,8,0.15);
    color: #eab308;
}

.badge.bad {
    background: rgba(239,68,68,0.15);
    color: #ef4444;
}

/* ACTION BUTTONS */
.action-btn {
    border: none;
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    margin-right: 6px;
}

.edit {
    background: #1f2937;
    color: white;
}

.edit:hover {
    background: #374151;
}

.delete {
    background: #ef4444;
    color: white;
}

.delete:hover {
    background: #dc2626;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.7);
    z-index: 1000;
    align-items: center;
    justify-content: center;
}

.modal.active {
    display: flex;
}

.modal-content {
    background: #151515;
    border: 1px solid #2a2a2a;
    border-radius: 14px;
    padding: 30px;
    width: 90%;
    max-width: 400px;
}

.modal-title {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 20px;
}

.form-group {
    margin-bottom: 18px;
}

.form-group label {
    display: block;
    font-size: 13px;
    color: #9ca3af;
    margin-bottom: 6px;
    font-weight: 500;
}

.form-group input,
.form-group select {
    width: 100%;
    background: #111;
    border: 1px solid #2a2a2a;
    color: white;
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
}

.form-group input:focus,
.form-group select:focus {
    outline: none;
    border-color: #3b82f6;
}

.form-actions {
    display: flex;
    gap: 10px;
    margin-top: 24px;
}

.btn-save {
    flex: 1;
    background: #3b82f6;
    border: none;
    color: white;
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 500;
}

.btn-save:hover {
    background: #2563eb;
}

.btn-cancel {
    flex: 1;
    background: #374151;
    border: none;
    color: white;
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 500;
}

.btn-cancel:hover {
    background: #4b5563;
}

.empty-message {
    text-align: center;
    padding: 40px 20px;
    color: #9ca3af;
}
</style>

</head>

<body>

<!-- BACK BUTTON -->
<button class="back-btn" onclick="history.back()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"></polyline>
    </svg>
    Back to Dashboard
</button>

<!-- HEADER -->
<div class="header">
    <div>
        <div class="title">Equipment Inventory</div>
        <div class="subtitle">Manage gym equipment</div>
    </div>

    <button class="add-btn" id="addBtn">+ Add Equipment</button>
</div>

<!-- CARD -->
<div class="card">

    <div class="card-header">
        <div class="card-title">Equipment List</div>
        <input class="search" id="searchInput" placeholder="Search equipment...">
    </div>

    <table>
        <thead>
            <tr>
                <th>EQUIPMENT NAME</th>
                <th>TYPE</th>
                <th>CONDITION</th>
                <th>QUANTITY</th>
                <th>ACTIONS</th>
            </tr>
        </thead>

        <tbody id="tableBody">
            <tr>
                <td colspan="5" class="empty-message">Loading equipment...</td>
            </tr>
        </tbody>
    </table>

</div>

<!-- MODAL -->
<div class="modal" id="equipmentModal">
    <div class="modal-content">
        <div class="modal-title" id="modalTitle">Add Equipment</div>
        
        <form id="equipmentForm">
            <div class="form-group">
                <label for="equipmentName">Equipment Name</label>
                <input type="text" id="equipmentName" required>
            </div>

            <div class="form-group">
                <label for="equipmentType">Type</label>
                <input type="text" id="equipmentType" required>
            </div>

            <div class="form-group">
                <label for="equipmentCondition">Condition</label>
                <select id="equipmentCondition" required>
                    <option value="">Select condition</option>
                    <option value="GOOD">GOOD</option>
                    <option value="AVERAGE">AVERAGE</option>
                    <option value="BAD">BAD</option>
                </select>
            </div>

            <div class="form-group">
                <label for="equipmentQuantity">Quantity</label>
                <input type="number" id="equipmentQuantity" min="1" required>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-save">Save</button>
                <button type="button" class="btn-cancel" id="cancelBtn">Cancel</button>
            </div>
        </form>
    </div>
</div>

<script type="module" src="equipment.js"></script>
</body>
</html>
